<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAViDEO-91 | Maintenance en cours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at 10% 10%, rgba(37, 99, 235, 0.05) 0%, #ffffff 100%);
            overflow: hidden;
        }

        .gradient-text {
            background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            padding: 0.1em 0; /* Évite que le haut/bas des lettres soit rogné */
        }

        .pulse-container {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .floating-icon {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center p-6">

    <div class="max-w-2xl w-full text-center">
        <!-- Logo -->
        <div class="flex justify-center mb-12 floating-icon">
            <div class="w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white text-4xl shadow-2xl shadow-blue-200">
                <i class="fas fa-film"></i>
            </div>
        </div>

        <!-- Titre -->
        <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-6 leading-[1.1]">
            EN TRAVAUX <br>
            <span class="italic gradient-text uppercase">Bientôt disponible.</span>
        </h1>

        <!-- Message -->
        <p class="text-slate-500 text-lg md:text-xl mb-12 max-w-lg mx-auto leading-relaxed">
            On peaufine les derniers rendus IA pour vous offrir une expérience cinématographique encore plus immersive.
        </p>

        <!-- Status Card -->
        <div class="inline-flex items-center gap-3 bg-white px-8 py-4 rounded-3xl shadow-xl shadow-blue-100 border border-slate-50 mb-12">
            <div class="w-3 h-3 bg-blue-600 rounded-full pulse-container"></div>
            <span class="font-black text-xs uppercase tracking-[0.2em] text-slate-900">Maintenance en cours</span>
        </div>

        <!-- Contact direct -->
        <div class="flex flex-col items-center gap-4">
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-2">Un projet urgent ?</p>
            <a href="tel:0749518336" class="flex items-center gap-3 text-slate-900 font-black text-2xl tracking-tighter hover:text-blue-600 transition-colors">
                <i class="fas fa-phone-volume text-blue-600 text-xl"></i>
                07.49.51.83.36
            </a>
        </div>
    </div>

    <!-- Déco arrière plan -->
    <div class="absolute bottom-0 left-0 p-12 opacity-10 pointer-events-none">
        <div class="text-[20rem] font-black italic">IA</div>
    </div>

</body>
</html>
