<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — IAViDEO-91</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background: #0a0f1e; color: white; min-height: 100vh; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 1.5rem; }
  .badge-attente { background: rgba(234,179,8,0.15); color: #fbbf24; }
  .badge-cours { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-livree { background: rgba(34,197,94,0.15); color: #4ade80; }
  select option { background: #1f2937; color: white; }
  .stat-card { background: linear-gradient(135deg, #111827, #1f2937); border: 1px solid #374151; border-radius: 1rem; padding: 1.25rem; text-align: center; }
  #login-screen { position: fixed; inset: 0; background: #0a0f1e; display: flex; align-items: center; justify-content: center; z-index: 100; }
  input[type="password"] { background: #1f2937; border: 2px solid #374151; color: white; border-radius: 1rem; padding: 1rem 1.25rem; width: 100%; outline: none; font-size: 1rem; }
  input[type="password"]:focus { border-color: #3b82f6; }
  .spinner { width: 2rem; height: 2rem; border: 3px solid #374151; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  select { background: #1f2937; border: 1px solid #374151; color: white; border-radius: 0.75rem; padding: 0.5rem 0.75rem; font-size: 0.75rem; font-weight: 700; cursor: pointer; outline: none; }
  select:focus { border-color: #3b82f6; }
  .row { display: flex; align-items: center; justify-content: space-between; background: #1f2937; border-radius: 1rem; padding: 1rem 1.25rem; gap: 1rem; flex-wrap: wrap; }
  .avatar { width: 2.5rem; height: 2.5rem; background: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; flex-shrink: 0; }
</style>
</head>
<body>

<!-- ÉCRAN DE CONNEXION -->
<div id="login-screen">
  <div style="width:100%;max-width:400px;padding:2rem;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="width:4rem;height:4rem;background:#dc2626;border-radius:1rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;">⚡</div>
      <h1 style="font-size:1.75rem;font-weight:900;text-transform:uppercase;letter-spacing:-0.02em;">Panel Admin</h1>
      <p style="color:#6b7280;font-size:0.875rem;margin-top:0.25rem;">IAViDEO-91</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:0.75rem;">
      <input type="email" id="admin-email-input" placeholder="Email admin" style="background:#1f2937;border:2px solid #374151;color:white;border-radius:1rem;padding:1rem 1.25rem;width:100%;outline:none;font-size:1rem;" onkeydown="if(event.key==='Enter')loginAdmin()">
      <input type="password" id="admin-pass-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')loginAdmin()">
      <button onclick="loginAdmin()" style="padding:1rem;background:#dc2626;color:white;font-weight:900;border-radius:1rem;font-size:0.875rem;letter-spacing:0.1em;text-transform:uppercase;border:none;cursor:pointer;margin-top:0.25rem;transition:opacity 0.2s;" onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">
        Accéder au panel →
      </button>
      <p id="login-error" style="color:#f87171;text-align:center;font-size:0.75rem;font-weight:700;display:none;">Email ou mot de passe incorrect</p>
    </div>
  </div>
</div>

<!-- CONTENU ADMIN -->
<div id="admin-app" style="display:none;padding:2rem;max-width:1100px;margin:0 auto;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
    <div>
      <p style="color:#ef4444;font-weight:900;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.25rem;">⚡ Accès Administrateur</p>
      <h1 style="font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:-0.02em;">Panel Admin</h1>
    </div>
    <div style="display:flex;gap:0.75rem;">
      <button onclick="loadAll()" style="padding:0.625rem 1.25rem;background:#1f2937;color:white;font-weight:700;border-radius:0.75rem;font-size:0.75rem;text-transform:uppercase;border:1px solid #374151;cursor:pointer;">
        <i class="fas fa-refresh"></i> Actualiser
      </button>
      <a href="/" style="padding:0.625rem 1.25rem;background:#374151;color:white;font-weight:700;border-radius:0.75rem;font-size:0.75rem;text-transform:uppercase;text-decoration:none;">
        ← Site
      </a>
      <button onclick="logout()" style="padding:0.625rem 1.25rem;background:#7f1d1d;color:white;font-weight:700;border-radius:0.75rem;font-size:0.75rem;text-transform:uppercase;border:none;cursor:pointer;">
        Déconnexion
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;">
    <div class="stat-card">
      <div id="s-users" style="font-size:2rem;font-weight:900;color:#60a5fa;">—</div>
      <p style="color:#6b7280;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.25rem;">Membres</p>
    </div>
    <div class="stat-card">
      <div id="s-total" style="font-size:2rem;font-weight:900;color:#fbbf24;">—</div>
      <p style="color:#6b7280;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.25rem;">Commandes</p>
    </div>
    <div class="stat-card">
      <div id="s-cours" style="font-size:2rem;font-weight:900;color:#fb923c;">—</div>
      <p style="color:#6b7280;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.25rem;">En cours</p>
    </div>
    <div class="stat-card">
      <div id="s-livrees" style="font-size:2rem;font-weight:900;color:#4ade80;">—</div>
      <p style="color:#6b7280;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.25rem;">Livrées</p>
    </div>
  </div>

  <!-- Membres -->
  <div class="card" style="margin-bottom:1.5rem;">
    <div style="padding:1.25rem 1.5rem;border-bottom:1px solid #1f2937;display:flex;align-items:center;justify-content:space-between;">
      <h2 style="font-weight:900;font-size:1rem;text-transform:uppercase;letter-spacing:0.05em;">👥 Membres inscrits</h2>
      <span id="count-users" style="color:#6b7280;font-size:0.8rem;font-weight:700;"></span>
    </div>
    <div id="list-users" style="padding:1.25rem;display:flex;flex-direction:column;gap:0.75rem;">
      <div style="display:flex;align-items:center;justify-content:center;padding:2rem;">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Commandes -->
  <div class="card">
    <div style="padding:1.25rem 1.5rem;border-bottom:1px solid #1f2937;display:flex;align-items:center;justify-content:space-between;">
      <h2 style="font-weight:900;font-size:1rem;text-transform:uppercase;letter-spacing:0.05em;">📦 Toutes les commandes</h2>
      <span id="count-commandes" style="color:#6b7280;font-size:0.8rem;font-weight:700;"></span>
    </div>
    <div id="list-commandes" style="padding:1.25rem;display:flex;flex-direction:column;gap:0.75rem;">
      <div style="display:flex;align-items:center;justify-content:center;padding:2rem;">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://dbxoacwdalvuqlmamigu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRieG9hY3dkYWx2dXFsbWFtaWd1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODM2MTk2MywiZXhwIjoyMDkzOTM3OTYzfQ.Ao2oxGKv910wbNKFcIAb0VQ-FCOEYB6wctcwe6vfPzA';
const ADMIN_EMAIL = 'andre.c@iavideo91.fr';
const ADMIN_PASS_HASH = 'iavideo91admin'; // mot de passe simple côté JS
let authenticated = false;

let sb = null;

window.addEventListener('load', () => {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
});

async function loginAdmin() {
  const email = document.getElementById('admin-email-input').value.trim();
  const pass = document.getElementById('admin-pass-input').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';

  if (!email || !pass) { err.textContent = 'Remplissez les deux champs'; err.style.color='#f87171'; err.style.display = 'block'; return; }
  if (email !== ADMIN_EMAIL) { err.textContent = 'Email non autorisé'; err.style.color='#f87171'; err.style.display = 'block'; return; }

  err.textContent = 'Connexion...'; err.style.color='#60a5fa'; err.style.display='block';

  // Auth via Supabase avec les vrais identifiants
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    err.textContent = 'Mot de passe incorrect';
    err.style.color = '#f87171';
    return;
  }

  authenticated = true;
  showApp();
  loadAll();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-app').style.display = 'block';
}

async function logout() {
  authenticated = false;
  await sb.auth.signOut();
  location.reload();
}

async function loadAll() {
  await loadUsers();
  await loadCommandes();
}

async function loadUsers() {
  const { data: users, error } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return; }

  document.getElementById('s-users').textContent = users?.length || 0;
  document.getElementById('count-users').textContent = `${users?.length || 0} membre(s)`;

  const list = document.getElementById('list-users');
  if (!users || users.length === 0) {
    list.innerHTML = '<p style="color:#6b7280;text-align:center;padding:2rem;font-size:0.875rem;">Aucun membre</p>';
    return;
  }

  list.innerHTML = users.map(u => `
    <div class="row">
      <div style="display:flex;align-items:center;gap:0.75rem;flex:1;min-width:0;">
        <div class="avatar">${(u.prenom || '?')[0].toUpperCase()}</div>
        <div style="min-width:0;">
          <p style="font-weight:900;font-size:0.875rem;">${u.prenom || ''} ${u.nom || '—'}</p>
          <p style="color:#6b7280;font-size:0.75rem;">${u.telephone || 'Pas de téléphone'}</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;flex-shrink:0;">
        ${u.generation_utilisee
          ? '<span style="background:rgba(34,197,94,0.1);color:#4ade80;padding:0.25rem 0.75rem;border-radius:999px;font-size:0.65rem;font-weight:900;text-transform:uppercase;">Essai utilisé</span>'
          : '<span style="background:#1f2937;color:#6b7280;padding:0.25rem 0.75rem;border-radius:999px;font-size:0.65rem;font-weight:900;text-transform:uppercase;">Pas d\'essai</span>'}
        <span style="color:#4b5563;font-size:0.75rem;">${new Date(u.created_at).toLocaleDateString('fr-FR')}</span>
      </div>
    </div>`).join('');
}

async function loadCommandes() {
  const { data: commandes, error } = await sb.from('commandes')
    .select('*, profiles(prenom, nom, telephone)')
    .order('created_at', { ascending: false });
  if (error) { console.error(error); return; }

  const total = commandes?.length || 0;
  const enCours = commandes?.filter(c => c.statut === 'en_cours').length || 0;
  const livrees = commandes?.filter(c => c.statut === 'livree').length || 0;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-cours').textContent = enCours;
  document.getElementById('s-livrees').textContent = livrees;
  document.getElementById('count-commandes').textContent = `${total} commande(s)`;

  const list = document.getElementById('list-commandes');
  if (!commandes || commandes.length === 0) {
    list.innerHTML = '<p style="color:#6b7280;text-align:center;padding:2rem;font-size:0.875rem;">Aucune commande pour le moment</p>';
    return;
  }

  const statutSteps = ['en_attente', 'en_cours', 'livree'];
  const statutLabels = { en_attente: 'Reçue', en_cours: 'En production', livree: 'Livrée' };
  const statutIcons = { en_attente: '📥', en_cours: '⚙️', livree: '✅' };

  list.innerHTML = commandes.map(c => {
    const currentStep = statutSteps.indexOf(c.statut);
    const timeline = statutSteps.map((s, i) => {
      const done = i <= currentStep;
      const active = i === currentStep;
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:0.25rem;flex:1;">
        <div style="width:2rem;height:2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;
          background:${done ? (active ? '#2563eb' : '#16a34a') : '#374151'};
          border:2px solid ${done ? (active ? '#3b82f6' : '#22c55e') : '#4b5563'};">
          ${done ? (active ? '●' : '✓') : '○'}
        </div>
        <span style="font-size:0.6rem;font-weight:700;text-transform:uppercase;color:${done ? '#e5e7eb' : '#6b7280'};">${statutLabels[s]}</span>
      </div>
      ${i < 2 ? `<div style="flex:1;height:2px;background:${i < currentStep ? '#16a34a' : '#374151'};margin-top:1rem;"></div>` : ''}`;
    }).join('');

    return `
    <div style="background:#1f2937;border-radius:1rem;padding:1.25rem;border:1px solid #374151;margin-bottom:0.75rem;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
        <div>
          <p style="font-weight:900;font-size:0.95rem;">${statutIcons[c.statut]} ${c.type_projet || 'Projet IA'}</p>
          <p style="color:#9ca3af;font-size:0.75rem;margin-top:0.2rem;">
            👤 ${c.profiles?.prenom || ''} ${c.profiles?.nom || '—'}
            ${c.profiles?.telephone ? ` · 📞 ${c.profiles.telephone}` : ''}
          </p>
          ${c.description ? `<p style="color:#6b7280;font-size:0.7rem;margin-top:0.25rem;font-style:italic;">"${c.description.substring(0,100)}..."</p>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem;">
          ${c.prix ? `<span style="font-weight:900;color:#fbbf24;">${c.prix}€</span>` : ''}
          <span style="color:#6b7280;font-size:0.7rem;">${new Date(c.created_at).toLocaleDateString('fr-FR')}</span>
        </div>
      </div>

      <!-- Timeline visuelle -->
      <div style="display:flex;align-items:center;margin-bottom:1rem;">${timeline}</div>

      <!-- Changement de statut -->
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button onclick="updateStatut('${c.id}','en_attente')" style="padding:0.4rem 0.75rem;border-radius:0.5rem;font-size:0.7rem;font-weight:700;border:none;cursor:pointer;background:${c.statut==='en_attente'?'#854d0e':'#374151'};color:${c.statut==='en_attente'?'#fbbf24':'#9ca3af'};">
          📥 Reçue
        </button>
        <button onclick="updateStatut('${c.id}','en_cours')" style="padding:0.4rem 0.75rem;border-radius:0.5rem;font-size:0.7rem;font-weight:700;border:none;cursor:pointer;background:${c.statut==='en_cours'?'#1e3a8a':'#374151'};color:${c.statut==='en_cours'?'#60a5fa':'#9ca3af'};">
          ⚙️ En production
        </button>
        <button onclick="updateStatut('${c.id}','livree')" style="padding:0.4rem 0.75rem;border-radius:0.5rem;font-size:0.7rem;font-weight:700;border:none;cursor:pointer;background:${c.statut==='livree'?'#14532d':'#374151'};color:${c.statut==='livree'?'#4ade80':'#9ca3af'};">
          ✅ Livrée
        </button>
        ${c.profiles?.telephone ? `
        <a href="https://wa.me/33${c.profiles.telephone.replace(/^0/,'').replace(/\s/g,'')}" target="_blank"
          style="padding:0.4rem 0.75rem;border-radius:0.5rem;font-size:0.7rem;font-weight:700;background:#15803d;color:white;text-decoration:none;margin-left:auto;">
          💬 WhatsApp client
        </a>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function updateStatut(id, statut) {
  await sb.from('commandes').update({ statut, updated_at: new Date().toISOString() }).eq('id', id);
  await loadCommandes();
}
</script>
</body>
</html>
